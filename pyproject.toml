[project]
name = "sharedmemoryserver"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastmcp",
    "aiofiles",
    "google-genai",
    "numpy",
    "ruff",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
]

[project.scripts]
shared-memory = "shared_memory.server:main"
shared-memory-register = "shared_memory.register:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_memory"]
