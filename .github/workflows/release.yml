name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Installer (Windows)
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          # Build single-file executable
          # We include the server and registration logic
          # The entry point will be a wrapper or the server itself
          # For a better user experience, we'll create a single EXE that can act as both
          pyinstaller --onefile --name SharedMemoryServer --clean src/shared_memory/server.py

      - name: Rename and Prepare Registration Tool
        run: |
          # We might want a separate EXE for registration or a combined one
          # Let's build the register tool as well
          pyinstaller --onefile --name SharedMemoryRegister --clean src/shared_memory/register.py

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/SharedMemoryServer.exe
            dist/SharedMemoryRegister.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
