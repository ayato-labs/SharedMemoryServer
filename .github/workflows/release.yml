name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  quality-gate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ruff Check
        run: uv run ruff check .

      - name: Run Tests
        run: uv run pytest tests/

  pypi-publish:
    name: Publish to PyPI
    needs: [quality-gate]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Build package
        run: uv build
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    name: Build EXE & Create GitHub Release
    needs: [quality-gate]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Build Tools
        run: uv pip install pyinstaller Pillow

      - name: Build Standalone EXE
        run: uv run scripts/build_exe.py

      - name: Create Release and Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ripen.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
